<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn.selected {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #2563eb !important;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900 sm:text-4xl">📝 Test Sistemi</h1>
        </header>

        <div class="grid grid-cols-1 gap-8">
            
            <section id="setup-panel" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-gray-700 flex items-center gap-2">Test Ayarlarını Daxil Edin</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Başlanğıc Sual Nömrəsi:</label>
                        <input type="number" id="range-start" value="1" min="1" oninput="validateInputs()" onkeydown="onlyNumbers(event)" class="w-full p-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bitiş Sual Nömrəsi:</label>
                        <input type="number" id="range-end" value="10" min="1" oninput="validateInputs()" onblur="correctRangeEnd()" onkeydown="onlyNumbers(event)" class="w-full p-2 border border-gray-300 rounded-lg">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Sual Sıralaması:</label>
                        <select id="quiz-order" class="w-full p-2 border border-gray-300 rounded-lg bg-white">
                            <option value="random">Qarışdırılmış</option>
                            <option value="sequential">Ardıcıl</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Düşəcək Sual Sayı:</label>
                        <input type="number" id="quiz-limit" min="1" placeholder="Hamısı" onkeydown="onlyNumbers(event)" class="w-full p-2 border border-gray-300 rounded-lg">
                    </div>
                </div>
                <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition shadow-md cursor-pointer">Testi Başlat 🚀</button>
            </section>

            <section id="quiz-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6 border-b pb-4 border-gray-100">
                    <span id="progress-text" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Sual: 1/25</span>
                    <button onclick="abortQuiz()" class="text-sm text-red-600 hover:underline cursor-pointer">Testdən Çıx</button>
                </div>
                <div class="mb-6">
                    <h3 id="question-text" class="text-lg font-medium text-gray-900 mb-4"></h3>
                    <div id="options-container" class="space-y-3"></div>
                </div>
                <div class="flex justify-between items-center mt-8">
                    <button id="prev-btn" onclick="prevQuestion()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-medium disabled:opacity-50 cursor-pointer">Geri</button>
                    <button id="next-btn" onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium cursor-pointer">Növbəti</button>
                </div>
            </section>

            <section id="result-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">🎉 Test Bitdi!</h2>
                    <p class="text-gray-500 mb-6">Nəticəniz aşağıdakı kimidir:</p>
                    <div class="grid grid-cols-3 gap-4 max-w-md mx-auto mb-8">
                        <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                            <span class="block text-2xl font-bold text-green-600" id="res-correct">0</span>
                            <span class="text-xs text-green-700 font-medium">Doğru</span>
                        </div>
                        <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                            <span class="block text-2xl font-bold text-red-600" id="res-wrong">0</span>
                            <span class="text-xs text-red-700 font-medium">Yanlış / Boş</span>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <span class="block text-2xl font-bold text-blue-600" id="res-percent">0%</span>
                            <span class="text-xs text-blue-700 font-medium">Müvəffəqiyyət</span>
                        </div>
                    </div>
                    <button onclick="backToSetup()" class="bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-6 rounded-lg transition cursor-pointer">Yenidən Başla 🔄</button>
                </div>
                <div class="border-t border-gray-100 pt-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 text-center sm:text-left">🔍 Sual İcmalı və Detallar</h3>
                    <div id="review-container" class="space-y-6"></div>
                </div>
            </section>

            <section id="history-panel" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-gray-700 flex items-center gap-2"><span>📊</span> Test Nəticələri</h2>
                    <button onclick="clearHistory()" class="text-xs font-medium text-red-600 hover:text-red-800 border border-red-200 hover:bg-red-50 px-2 py-1 rounded cursor-pointer transition">Tarixçəni Təmizlə</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm text-left text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                            <tr>
                                <th class="px-4 py-3">Tarix</th>
                                <th class="px-4 py-3">Aralıq</th>
                                <th class="px-4 py-3 text-center">Növ</th>
                                <th class="px-4 py-3">Doğru/Yanlış</th>
                                <th class="px-4 py-3">Faiz</th>
                                <th class="px-4 py-3 text-right">Ətraflı</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

];

        let currentQuestions = [], currentQuestionIndex = 0, userResponses = [];

        function onlyNumbers(e) {
            if (["Delete", "Backspace", "Tab", "Escape", "Enter", "ArrowLeft", "ArrowRight"].includes(e.key)) return;
            if (e.shiftKey || e.key < "0" || e.key > "9") e.preventDefault();
        }

        function validateInputs() {
            let start = parseInt(el('range-start').value), end = parseInt(el('range-end').value);
            const total = embeddedQuestions.length;
            if(start < 1) el('range-start').value = 1;
            if(start > total) el('range-start').value = total;
            if(end > total) el('range-end').value = total;
        }

        function correctRangeEnd() {
            const start = parseInt(el('range-start').value) || 1;
            let end = parseInt(el('range-end').value) || 1;
            if(end < start) end = start;
            if(end > embeddedQuestions.length) end = embeddedQuestions.length;
            el('range-end').value = end;
        }

        function startQuiz() {
            correctRangeEnd();
            const start = parseInt(el('range-start').value), end = parseInt(el('range-end').value);
            const limitInput = el('quiz-limit').value, limit = limitInput ? parseInt(limitInput) : null;

            let filtered = embeddedQuestions.filter(q => q.id >= start && q.id <= end);
            if(!filtered.length) return alert("Seçilmiş aralıqda sual tapılmadı.");

            if (el('quiz-order').value === 'random') filtered = shuffleArray(filtered);
            if (limit && limit > 0 && limit < filtered.length) filtered = filtered.slice(0, limit);

            currentQuestions = filtered.map(q => ({ ...q, options: shuffleArray(q.options) }));
            currentQuestionIndex = 0;
            userResponses = new Array(currentQuestions.length).fill(null);

            togglePanel('quiz-panel', ['setup-panel', 'history-panel']);
            showQuestion();
        }

        const shuffleArray = array => [...array].sort(() => Math.random() - 0.5);

        function showQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            el('progress-text').innerText = `Sual: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            el('question-text').innerText = q.question;
            
            el('options-container').innerHTML = q.options.map(opt => `
                <button onclick="selectOption('${opt.replace(/'/g, "\\'")}')" class="option-btn w-full text-left p-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition font-medium cursor-pointer flex items-center ${userResponses[currentQuestionIndex] === opt ? 'selected' : ''}">
                    ${opt}
                </button>
            `).join('');

            el('prev-btn').disabled = currentQuestionIndex === 0;
            const nextBtn = el('next-btn');
            nextBtn.innerText = currentQuestionIndex === currentQuestions.length - 1 ? "Bitir 🏁" : "Növbəti";
            nextBtn.className = currentQuestionIndex === currentQuestions.length - 1 ? "bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium cursor-pointer" : "bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium cursor-pointer";
        }

        function selectOption(opt) {
            userResponses[currentQuestionIndex] = opt;
            document.querySelectorAll('#options-container .option-btn').forEach(b => {
                b.classList.toggle('selected', b.innerText.trim() === opt);
            });
        }

        function prevQuestion() { if(currentQuestionIndex > 0) { currentQuestionIndex--; showQuestion(); } }
        function nextQuestion() { currentQuestionIndex < currentQuestions.length - 1 ? (currentQuestionIndex++, showQuestion()) : finishQuiz(); }

        function finishQuiz() {
            let correctCount = currentQuestions.filter((q, i) => userResponses[i] === q.answer).length;
            let wrongCount = currentQuestions.length - correctCount;
            const percent = currentQuestions.length ? Math.round((correctCount / currentQuestions.length) * 100) : 0;
            
            el('res-correct').innerText = correctCount; el('res-wrong').innerText = wrongCount; el('res-percent').innerText = `${percent}%`;

            let history = JSON.parse(localStorage.getItem('quiz_history_v2')) || [];
            history.unshift({
                date: new Date().toLocaleString('az-AZ'),
                range: `${el('range-start').value} - ${el('range-end').value}`,
                order: el('quiz-order').value === 'random' ? 'Qarışdırılmış' : 'Ardıcıl',
                score: `${correctCount} / ${wrongCount}`,
                percent: `${percent}%`,
                savedQuestions: currentQuestions,
                savedResponses: userResponses
            });
            localStorage.setItem('quiz_history_v2', JSON.stringify(history));

            renderHistory();
            renderDetailedReview(currentQuestions, userResponses);
            togglePanel('result-panel', ['quiz-panel']);
            el('history-panel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderDetailedReview(questions, responses) {
            el('review-container').innerHTML = questions.map((q, idx) => {
                const opts = q.options.map(opt => {
                    const isChosen = responses[idx] === opt, isCorrect = q.answer === opt;
                    let cls = 'bg-white border-gray-200 text-gray-600', icon = '';
                    if (isCorrect) { cls = 'bg-green-50 border-green-300 text-green-800'; icon = "<span class='text-xs bg-green-200 text-green-800 px-2 py-0.5 rounded-full font-bold'>✅</span>"; }
                    else if (isChosen) { cls = 'bg-red-50 border-red-300 text-red-800'; icon = "<span class='text-xs bg-red-200 text-red-800 px-2 py-0.5 rounded-full font-bold'>❌</span>"; }
                    return `<div class="p-2.5 rounded-lg border font-medium flex items-center justify-between ${cls}">${opt} ${icon}</div>`;
                }).join('');

                return `<div class="p-4 rounded-xl border border-gray-100 bg-gray-50">
                            <div class="mb-3">
                                <div class="inline-block bg-gray-200/70 text-gray-700 text-xs font-semibold px-2 py-1 rounded">Sual: #${q.id}</div>
                                <h4 class="font-medium text-gray-900 text-base mt-1">${idx + 1}. ${q.question}</h4>
                            </div>
                            <div class="space-y-2 text-sm">
                                ${opts}
                                ${responses[idx] === null ? '<div class="mt-2 text-xs font-semibold text-amber-600 border border-amber-500 bg-amber-50 px-2 py-1 rounded w-fit">⚠️ Bu sual cavablandırılmayıb.</div>' : ''}
                            </div>
                        </div>`;
            }).join('');
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('quiz_history_v2')) || [];
            const tbody = el('history-tbody');
            if(!history.length) return tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-4 text-center text-gray-400 font-medium">Heç bir keçmiş nəticə yoxdur.</td></tr>`;

            tbody.innerHTML = history.map((h, idx) => `
                <tr class="bg-white border-b border-gray-100 hover:bg-gray-50 transition">
                    <td class="px-4 py-3 font-medium text-gray-900 whitespace-nowrap">${h.date}</td>
                    <td class="px-4 py-3">${h.range}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 text-xs rounded-full font-medium ${h.order==='Ardıcıl'?'bg-purple-50 text-purple-700 border border-purple-100':'bg-amber-50 text-amber-700 border border-amber-100'}">${h.order}</span></td>
                    <td class="px-4 py-3 text-center font-semibold"><span class="text-green-600">${h.score.split(' / ')[0]}</span> / <span class="text-red-500">${h.score.split(' / ')[1]}</span></td>
                    <td class="px-4 py-3 font-bold text-blue-600">${h.percent}</td>
                    <td class="px-4 py-3 text-right"><button onclick="viewHistoryItem(${idx})" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded text-xs font-medium cursor-pointer" title="Cavablara bax">👁️ Bax</button></td>
                </tr>`).join('');
        }

        window.onload = () => { renderHistory(); el('range-end').value = embeddedQuestions.length; };

        function viewHistoryItem(idx) {
            const record = (JSON.parse(localStorage.getItem('quiz_history_v2')) || [])[idx];
            if(!record) return;
            togglePanel('result-panel', ['setup-panel', 'quiz-panel']);
            el('history-panel').classList.remove('hidden');
            el('res-correct').innerText = record.score.split(' / ')[0];
            el('res-wrong').innerText = record.score.split(' / ')[1];
            el('res-percent').innerText = record.percent;
            renderDetailedReview(record.savedQuestions, record.savedResponses);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function abortQuiz() { if(confirm("Testdən çıxmaq istədiyinizə əminsiniz? Cari irəliləyişiniz itəcək.")) backToSetup(); }
        function backToSetup() { togglePanel('setup-panel', ['quiz-panel', 'result-panel']); el('history-panel').classList.remove('hidden'); validateInputs(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function clearHistory() { if(confirm("Bütün tarixçə silinsin? Bu geri qaytarıla bilməz.")) { localStorage.removeItem('quiz_history_v2'); renderHistory(); } }
    </script>
</body>
